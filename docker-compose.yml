services:
  app:
    build: .
    container_name: tech_challenge_app_etapa_2
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - PORT=${PORT}
      - DB_HOST=db
      - DB_USER=user
      - DB_PASS=password # Deve ser igual ao do serviço db
      - DB_NAME=blogging_db
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: tech_challenge_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: blogging_db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

# ESSENCIAL: Declara o volume para os dados não sumirem
volumes:
  pgdata: