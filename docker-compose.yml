services:
  app:
    build: .
    container_name: tech_challenge_app_etapa_2
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - PORT=${PORT:-3000}
      - DB_HOST=${DB_HOST_DOCKER:-db}
      - DB_USER=${DB_USER:-user}
      - DB_PASS=${DB_PASSWORD:-password}
      - DB_NAME=${DB_NAME:-blogging_db}
      - DB_PORT=${DB_PORT:-5432}
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: tech_challenge_db
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-blogging_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${DB_PORT:-5432}:5432"

volumes:
  pgdata: